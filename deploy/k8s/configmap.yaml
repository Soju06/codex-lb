apiVersion: v1
kind: ConfigMap
metadata:
  name: codex-lb-config
data:
  CODEX_LB_METRICS_ENABLED: "true"
  CODEX_LB_METRICS_PORT: "9090"
  CODEX_LB_LOG_FORMAT: "json"
  CODEX_LB_LEADER_ELECTION_ENABLED: "true"
  CODEX_LB_LEADER_ELECTION_TTL_SECONDS: "30"
  CODEX_LB_CIRCUIT_BREAKER_ENABLED: "false"
  CODEX_LB_CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
  CODEX_LB_CIRCUIT_BREAKER_RECOVERY_TIMEOUT_SECONDS: "60"
  CODEX_LB_BACKPRESSURE_MAX_CONCURRENT_REQUESTS: "500"
  CODEX_LB_SHUTDOWN_DRAIN_TIMEOUT_SECONDS: "30"
  CODEX_LB_HTTP_CONNECTOR_LIMIT: "100"
  CODEX_LB_HTTP_CONNECTOR_LIMIT_PER_HOST: "50"
  # Session bridge: pods auto-use hostname as instance ID (socket.gethostname()).
  # Empty ring = single-instance mode (each pod routes all sessions to itself).
  # For multi-replica: set a comma-separated list of pod hostnames so consistent
  # hashing routes each session to a stable owner pod.
  # Example: "codex-lb-0,codex-lb-1,codex-lb-2" (StatefulSet pod names)
  CODEX_LB_HTTP_RESPONSES_SESSION_BRIDGE_INSTANCE_RING: ""
