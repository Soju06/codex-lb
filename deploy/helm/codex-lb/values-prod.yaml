# Production environment — high availability, full observability, hardened
replicaCount: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
affinity:
  podAntiAffinity: hard
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels: {}
networkPolicy:
  enabled: true
metrics:
  serviceMonitor:
    enabled: true
  prometheusRule:
    enabled: true
  grafanaDashboard:
    enabled: true
ingress:
  enabled: true
  certManager:
    enabled: true
externalSecrets:
  enabled: true
