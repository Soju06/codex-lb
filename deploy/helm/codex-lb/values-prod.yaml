# Production environment — high availability, full observability, hardened
replicaCount: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
affinity:
  podAntiAffinity: hard
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels: {}
networkPolicy:
  enabled: true
metrics:
  serviceMonitor:
    enabled: true
  prometheusRule:
    enabled: true
  grafanaDashboard:
    enabled: true
ingress:
  enabled: true
  certManager:
    enabled: true
  nginx:
    upstreamHashBy: "$http_authorization"
config:
  # Connection pool budget: (databasePoolSize + databaseMaxOverflow) × maxReplicas ≤ PostgreSQL max_connections
  # For maxReplicas=20: (3+2)×20=100 = PG default max_connections
  databasePoolSize: 3
  databaseMaxOverflow: 2
externalSecrets:
  enabled: true
