name: PR labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-24.04
    steps:
      - name: Apply path-based labels
        uses: actions/labeler@v6.0.1
        with:
          configuration-path: .github/labeler.yml
          sync-labels: false
