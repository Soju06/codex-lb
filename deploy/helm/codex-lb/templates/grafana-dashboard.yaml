{{- if and .Values.metrics.enabled .Values.metrics.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "codex-lb.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "codex-lb.labels" . | nindent 4 }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: {{ .Values.metrics.grafanaDashboard.folder | quote }}
data:
  codex-lb.json: |-
    {{ .Files.Get "dashboards/codex-lb.json" | nindent 4 }}
{{- end }}
