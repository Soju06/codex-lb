apiVersion: v1
kind: Secret
metadata:
  name: codex-lb-secrets
type: Opaque
# Use stringData — Kubernetes auto-encodes values to base64.
# Do NOT commit this file with real values. Use it as a template.
stringData:
  # PostgreSQL connection string. Required for multi-replica deployments.
  CODEX_LB_DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/codexlb"
  # Fernet key for encrypting account tokens at rest.
  # Generate a new key with:
  #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  encryption.key: "<PASTE_FERNET_KEY_HERE>"
